<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nico-Netflix Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Nico-Netflix Settings</h2>
    
    <div class="form-group">
      <label for="broadcast-id">NicoNico Live ID</label>
      <input type="text" id="broadcast-id" placeholder="lvXXXXXXX">
      <small style="color:#aaa; display:block; margin-top:4px;">(Enter "test" for simulation mode)</small>
    </div>

    <div class="form-group">
      <button id="start-btn">Start Overlay on Netflix</button>
      <button id="stop-btn" class="secondary">Stop Overlay</button>
    </div>

    <div class="form-group" style="margin-top:20px;">
      <label for="delay-offset">Comment Delay Offset (seconds)</label>
      <div class="slider-container">
        <input type="range" id="delay-offset" min="-10" max="10" step="0.1" value="0">
        <span id="delay-value">0.0s</span>
      </div>
      <small style="color:#aaa; display:block; margin-top:4px;">Adjust this to sync comments with your video stream.</small>
    </div>
    
  </div>
  <script src="popup.js"></script>
</body>
</html>
